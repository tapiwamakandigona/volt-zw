name: Build Android APK

# Builds a debug APK on every release and uploads it as an artifact + release asset.
# A signed release APK requires the keystore secrets (see docs/PLAN.md).

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: npm install

      - name: Build static web export
        run: npm run build
        env:
          NEXT_PUBLIC_APPWRITE_ENDPOINT: ${{ vars.NEXT_PUBLIC_APPWRITE_ENDPOINT }}
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_ID }}
          NEXT_PUBLIC_APPWRITE_DATABASE_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_DATABASE_ID }}

      - name: Add Capacitor Android platform
        run: |
          npx cap add android || npx cap sync android

      - name: Generate launcher icon + splash screen
        run: |
          npx @capacitor/assets generate --android \
            --iconBackgroundColor '#16a34a' \
            --iconBackgroundColorDark '#0e0e14' \
            --splashBackgroundColor '#0e0e14' \
            --splashBackgroundColorDark '#0e0e14'
          npx cap sync android

      - name: Register voltzw:// deep-link scheme (Google sign-in callback)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" <<'PY'
          import sys, re
          p = sys.argv[1]
          s = open(p).read()
          intent = (
              '            <intent-filter>\n'
              '                <action android:name="android.intent.action.VIEW" />\n'
              '                <category android:name="android.intent.category.DEFAULT" />\n'
              '                <category android:name="android.intent.category.BROWSABLE" />\n'
              '                <data android:scheme="voltzw" />\n'
              '            </intent-filter>\n'
          )
          if 'android:scheme="voltzw"' not in s:
              # inject just before the activity closes
              s = s.replace('        </activity>', intent + '        </activity>', 1)
              open(p, 'w').write(s)
              print('Injected voltzw:// intent-filter')
          else:
              print('Scheme already present')
          PY
          cat android/app/src/main/AndroidManifest.xml

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voltzw-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
